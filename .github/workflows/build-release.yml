name: The Forge (Release CI/CD)

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install vcpkg dependencies
      run: |
        vcpkg install openssl:x64-windows
        vcpkg install zstd:x64-windows
        vcpkg install opencl:x64-windows

    - name: Configure CMake (Windows)
      run: >
        cmake -B build -S .
        -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
        -DCMAKE_BUILD_TYPE=Release
        -A x64

    - name: Build diskform4th_core DLL
      run: cmake --build build --config Release --target diskform4th_core

    - name: Setup .NET 8.0
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Build C# WPF UI (Single File)
      run: |
        cd src/ui
        dotnet publish diskform4th_ui.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ../../publish_windows

    - name: Copy Native DLL to Publish Dir
      run: copy build\Release\diskform4th_core.dll publish_windows\

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v3
      with:
        name: diskform4th-windows-x64
        path: publish_windows/*

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential pkg-config libssl-dev libzstd-dev opencl-headers ocl-icd-opencl-dev liburing-dev

    - name: Configure CMake (Linux)
      run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

    - name: Build Core SO and Native CLI
      run: cmake --build build --config Release

    - name: Prepare Publish Dir
      run: |
        mkdir publish_linux
        cp build/libdiskform4th_core.so publish_linux/
        cp build/diskform4th_cli publish_linux/

    - name: Upload Linux Artifact
      uses: actions/upload-artifact@v3
      with:
        name: diskform4th-linux-x64
        path: publish_linux/*

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
    - name: Download Windows Artifacts
      uses: actions/download-artifact@v3
      with:
        name: diskform4th-windows-x64
        path: windows

    - name: Download Linux Artifacts
      uses: actions/download-artifact@v3
      with:
        name: diskform4th-linux-x64
        path: linux

    - name: Zip Artifacts
      run: |
        zip -r diskform4th-windows-x64.zip windows/
        tar -czvf diskform4th-linux-x64.tar.gz linux/

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          diskform4th-windows-x64.zip
          diskform4th-linux-x64.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
